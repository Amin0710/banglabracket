<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<meta name="design_doc_mode" content="canvas">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Baloo+Da+2:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>*{margin:0;padding:0;box-sizing:border-box}body{background:#e6e6dd}</style>
</helmet>

<section style="padding:80px 90px 110px;display:flex;gap:96px;align-items:flex-start;flex-wrap:wrap;font-family:'Baloo Da 2',sans-serif">

  <div id="1a" style="display:flex;flex-direction:column;gap:26px">
    <div style="display:flex;align-items:center;gap:14px">
      <span style="font-weight:800;font-size:19px;color:#0b3b28;background:#ffcb45;padding:5px 14px;border-radius:9px;letter-spacing:.02em">1a</span>
      <div style="display:flex;flex-direction:column;gap:2px">
        <div style="font-weight:800;font-size:26px;color:#15231b;line-height:1">Layout A · Classic converging tree</div>
        <div style="font-weight:500;font-size:15px;color:#5a6a53">Symmetric two-sided bracket, champion crowned at the center · 1080×1350</div>
      </div>
    </div>
    <div style="display:flex;flex-direction:column;gap:44px">
      <div style="display:flex;flex-direction:column;gap:12px">
        <span style="font-weight:700;font-size:14px;letter-spacing:.16em;text-transform:uppercase;color:#8a9a82">Light</span>
        <div style="width:1080px;height:1350px;box-shadow:0 40px 90px -40px rgba(20,35,27,.5);border-radius:2px;overflow:hidden">
          <dc-import name="BracketCard" layout="1" theme="light" hint-size="1080px,1350px" style="width:1080px;height:1350px"></dc-import>
        </div>
      </div>
      <div style="display:flex;flex-direction:column;gap:12px">
        <span style="font-weight:700;font-size:14px;letter-spacing:.16em;text-transform:uppercase;color:#8a9a82">Dark</span>
        <div style="width:1080px;height:1350px;box-shadow:0 40px 90px -40px rgba(0,0,0,.7);border-radius:2px;overflow:hidden">
          <dc-import name="BracketCard" layout="1" theme="dark" hint-size="1080px,1350px" style="width:1080px;height:1350px"></dc-import>
        </div>
      </div>
    </div>
  </div>

  <div id="1b" style="display:flex;flex-direction:column;gap:26px">
    <div style="display:flex;align-items:center;gap:14px">
      <span style="font-weight:800;font-size:19px;color:#0b3b28;background:#ffcb45;padding:5px 14px;border-radius:9px;letter-spacing:.02em">1b</span>
      <div style="display:flex;flex-direction:column;gap:2px">
        <div style="font-weight:800;font-size:26px;color:#15231b;line-height:1">Layout B · Champion hero + bracket receipt</div>
        <div style="font-weight:500;font-size:15px;color:#5a6a53">Big champion reveal up top, full bracket as proof below · 1080×1350</div>
      </div>
    </div>
    <div style="display:flex;flex-direction:column;gap:44px">
      <div style="display:flex;flex-direction:column;gap:12px">
        <span style="font-weight:700;font-size:14px;letter-spacing:.16em;text-transform:uppercase;color:#8a9a82">Light</span>
        <div style="width:1080px;height:1350px;box-shadow:0 40px 90px -40px rgba(20,35,27,.5);border-radius:2px;overflow:hidden">
          <dc-import name="BracketCard" layout="2" theme="light" hint-size="1080px,1350px" style="width:1080px;height:1350px"></dc-import>
        </div>
      </div>
      <div style="display:flex;flex-direction:column;gap:12px">
        <span style="font-weight:700;font-size:14px;letter-spacing:.16em;text-transform:uppercase;color:#8a9a82">Dark</span>
        <div style="width:1080px;height:1350px;box-shadow:0 40px 90px -40px rgba(0,0,0,.7);border-radius:2px;overflow:hidden">
          <dc-import name="BracketCard" layout="2" theme="dark" hint-size="1080px,1350px" style="width:1080px;height:1350px"></dc-import>
        </div>
      </div>
    </div>
  </div>

</section>
</x-dc>
</body>
</html>
