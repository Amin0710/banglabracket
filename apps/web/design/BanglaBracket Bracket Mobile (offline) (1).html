      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};

      const entry = manifest[uuid];

        const binaryStr = atob(entry.data);

            const reader = ds.readable.getReader();

            writer.close();

            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;

            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }

        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));

    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];

    for (const entry of extResources) {

    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>

    // attributes through, so match the full opening tag. slice() rather than

    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).

      const s = document.createElement('script');

      window.Babel.transformScriptTags();
    }

    console.error('Bundle unpack error:', err);

M3',round:'R16',a:'ARG',b:'NOR',status:'decided',sc:{a:2,b:1},aet:{a:'1+1',b:'1+0'},manner:'AET',win:'a'},\n    M4:{lbl:'M4',round:'R16',a:'ESP',b:'CRO',status:'live',sc:{a:0,b:0},min:34},\n    M5:{lbl:'M5',round:'R16',a:'FRA',b:'MEX',status:'decided',sc:{a:3,b:1},manner:'FT',win:'a'},\n    M6:{lbl:'M6',round:'R16',a:'NED',b:'USA',status:'live',sc:{a:1,b:0},min:61},\n    M7:{lbl:'M7',round:'R16',a:'POR',b:'ENG',status:'decided',sc:{a:1,b:0},manner:'FT',win:'a'},\n    M8:{lbl:'M8',round:'R16',a:'COL',b:'MAR',status:'upcoming',ko:'Today 20:00'},\n    Q1:{lbl:'QF1',round:'QF',a:'BRA',b:null,bcon:['GER','SUI'],status:'upcoming',ko:'Sat'},\n    Q2:{lbl:'QF2',round:'QF',a:'ARG',b:null,bcon:['ESP','CRO'],status:'upcoming',ko:'Sat'},\n    Q3:{lbl:'QF3',round:'QF',a:'FRA',b:null,bcon:['NED','USA'],status:'upcoming',ko:'Sun'},\n    Q4:{lbl:'QF4',round:'QF',a:'POR',b:null,bcon:['COL','MAR'],status:'upcoming',ko:'Sun'},\n    S1:{lbl:'SF1',round:'SF',a:null,b:null,acon:['BRA','…'],status:'upcoming',ko:'Tue'},\n    S2:{lbl:'SF2',round:'SF',a:null,b:null,status:'upcoming',ko:'Wed'},\n    F1:{lbl:'Final',round:'F',a:null,b:null,status:'upcoming',ko:'Jul 19'}\n  };\n\n  state = { mode:'rounds', round:'R16', focus:null, picks:{}, warn:null, ineligible:false, shareOpen:false, wholeZoom:'read' };\n\n  // ---- shared helpers ----\n  roundShort(r){ return {R16:'Round of 16',QF:'Quarter-final',SF:'Semi-final',F:'Final',R32:'Round of 32'}[r]||r; }\n  pend(m,slot){ if(slot==='b'&&m.bcon) return 'Winner '+m.bcon[0]+'/'+m.bcon[1]; if(slot==='a'&&m.acon) return 'Winner QF1/QF2'; return 'To be decided'; }\n  statusVM(m){ const C=this.C;\n    if(m.status==='live') return {text:'LIVE '+m.min+'’',color:C.teal,bg:C.tealS,dot:true};\n    if(m.status==='decided') return {text:m.manner,color:C.goldT,bg:C.goldS,dot:false};\n    return {text:m.ko||'Upcoming',color:C.mut,bg:C.s3,dot:false}; }\n  rowData(id,slot){ const m=this.matches[id],ab=m[slot],t=ab?this.teams[ab]:null,decided=m.status==='decided';\n    let score=''; if(m.status!=='upcoming'&&t){ score=(m.manner==='AET'&&m.aet)?m.aet[slot]:(m.sc?String(m.sc[slot]):''); }\n    return {ab:ab||'',name:t?t.n:this.pend(m,slot),flag:t?this.flag(ab):'',resolved:!!t,pending:!t,\n      win:decided&&m.win===slot,lose:decided&&m.win&&m.win!==slot,hasScore:m.status!=='upcoming'&&!!t,score,\n      live:m.status==='live',picked:this.state.picks[id]===slot}; }\n\n  // ---- pick + soft freeze ----\n  frozen(){ return true; } // R16 has started\n  tryPick(id,slot){ const m=this.matches[id]; const r=this.rowData(id,slot); if(!r.resolved) return; if(m.status==='decided'&&m.win!==slot) return;\n    if(this.frozen()) this.setState({warn:{id,slot,step:1}}); else this.applyPick(id,slot); }\n  applyPick(id,slot){ const p=Object.assign({},this.state.picks); if(p[id]===slot) delete p[id]; else p[id]=slot; this.setState({picks:p}); }\n\n  // ---- card VM (focus sheet) ----\n  cardFull(id){ const C=this.C,m=this.matches[id],s=this.statusVM(m);\n    const mk=(slot)=>{ const r=this.rowData(id,slot);\n      const base={display:'flex',alignItems:'center',gap:11,padding:'13px 13px',borderRadius:12,border:'1.5px solid '+C.line,background:C.surface,minHeight:52,cursor:(r.resolved&&!(m.status==='decided'&&!r.win))?'pointer':'default',userSelect:'none',WebkitTapHighlightColor:'transparent',transition:'border-color .12s,background .12s'};\n      let st=base; if(r.win)st=Object.assign({},base,{borderColor:C.grnL,background:C.grnS}); else if(r.lose)st=Object.assign({},base,{opacity:.5}); else if(r.picked)st=Object.assign({},base,{borderColor:C.goldL,background:C.goldS});\n      return Object.assign({},r,{style:st,onTap:()=>this.tryPick(id,slot),\n        nameStyle:{fontSize:15,fontWeight:r.win?800:600,color:r.resolved?(r.lose?C.mut:C.ink):C.faint,fontStyle:r.resolved?'normal':'italic',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',minWidth:0},\n        scoreStyle:{fontFamily:\"'Baloo Da 2',sans-serif\",fontWeight:800,fontSize:20,color:C.goldT,fontVariantNumeric:'tabular-nums',flex:'0 0 auto'}}); };\n    const tag=m.lbl==='Final'?'The Final':(m.lbl+' · '+this.roundShort(m.round));\n    return {id,tag,tagStyle:{fontSize:10.5,fontWeight:800,letterSpacing:'.07em',textTransform:'uppercase',color:C.faint},\n      statusText:s.text,dot:s.dot,dotStyle:{width:6,height:6,borderRadius:'50%',background:C.teal,animation:'bbBlink 1.1s infinite',flex:'0 0 auto'},\n      chipStyle:{display:'inline-flex',alignItems:'center',gap:5,fontSize:10.5,fontWeight:800,color:s.color,background:s.bg,padding:'3px 9px',borderRadius:7},\n      wrap:{background:C.surface,border:'1px solid '+C.line,borderRadius:16,padding:'14px'},\n      flagStyle:{width:27,height:18,borderRadius:3,objectFit:'cover',flex:'0 0 auto',boxShadow:'0 0 0 1px rgba(0,0,0,.1)'},\n      phStyle:{width:27,height:18,borderRadius:3,flex:'0 0 auto',background:C.s3,display:'flex',alignItems:'center',justifyContent:'center',fontSize:11,color:C.faint,fontWeight:800},\n      pickBadge:{fontSize:9,fontWeight:800,letterSpacing:'.05em',color:C.goldT,background:'rgba(255,203,69,.3)',padding:'3px 7px',borderRadius:6,flex:'0 0 auto'},\n      help:m.status==='decided'?'This match is finished — the result is locked in.':'Tap a team to set who you think goes through. Editing now (R16 has started) forfeits grand-prize eligibility.',\n      a:mk('a'),b:mk('b')}; }\n\n  // ---- rounds mode: flow columns R16 -> Final ----\n  flowGeo(){ const padX=18,padY=14,colW=232,NW=196,NH=104,rowH=118;\n    const ids=['M1','M2','M3','M4','M5','M6','M7','M8'];\n    const cy={}; ids.forEach((id,i)=>cy[id]=padY+i*rowH+NH/2);\n    cy.Q1=(cy.M1+cy.M2)/2; cy.Q2=(cy.M3+cy.M4)/2; cy.Q3=(cy.M5+cy.M6)/2; cy.Q4=(cy.M7+cy.M8)/2;\n    cy.S1=(cy.Q1+cy.Q2)/2; cy.S2=(cy.Q3+cy.Q4)/2; cy.F1=(cy.S1+cy.S2)/2;\n    const col={M1:0,M2:0,M3:0,M4:0,M5:0,M6:0,M7:0,M8:0,Q1:1,Q2:1,Q3:1,Q4:1,S1:2,S2:2,F1:3};\n    return {padX,padY,colW,NW,NH,rowH,cy,col,xOf:c=>padX+c*colW,canvasW:padX+4*colW,canvasH:padY+8*rowH+8}; }\n\n  flowNode(id,g){ const C=this.C,m=this.matches[id],s=this.statusVM(m),left=g.xOf(g.col[id]),top=g.cy[id]-g.NH/2;\n    const accent=m.status==='live'?C.teal:(m.status==='decided'?C.goldL:C.line);\n    const mk=(slot)=>{ const r=this.rowData(id,slot);\n      const base={display:'flex',alignItems:'center',gap:9,padding:'8px 9px',borderRadius:9,border:'1.5px solid '+C.line,background:C.surface,minHeight:34,cursor:(r.resolved&&!(m.status==='decided'&&!r.win))?'pointer':'default',userSelect:'none',WebkitTapHighlightColor:'transparent',transition:'border-color .12s,background .12s'};\n      let st=base; if(r.win)st=Object.assign({},base,{borderColor:C.grnL,background:C.grnS}); else if(r.lose)st=Object.assign({},base,{opacity:.5}); else if(r.picked)st=Object.assign({},base,{borderColor:C.goldL,background:C.goldS});\n      return Object.assign({},r,{style:st,onTap:()=>this.tryPick(id,slot),\n        nameStyle:{fontSize:13,fontWeight:r.win?800:600,color:r.resolved?(r.lose?C.mut:C.ink):C.faint,fontStyle:r.resolved?'normal':'italic',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',minWidth:0,letterSpacing:'.005em'},\n        scoreStyle:{fontFamily:\"'Baloo Da 2',sans-serif\",fontWeight:800,fontSize:16,color:C.goldT,fontVariantNumeric:'tabular-nums',flex:'0 0 auto'}}); };\n    return {id,tag:m.lbl==='Final'?'The Final':m.lbl,dot:s.dot,statusText:s.text,\n      boxStyle:{position:'absolute',left,top,width:g.NW,background:C.surface,border:'1.5px solid '+accent,borderRadius:14,padding:'10px 11px',boxShadow:'0 3px 8px rgba(20,35,27,.06)'},\n      tagStyle:{fontSize:10,fontWeight:800,letterSpacing:'.06em',color:C.faint},\n      chipStyle:{display:'inline-flex',alignItems:'center',gap:5,fontSize:10,fontWeight:800,color:s.color,background:s.bg,padding:'2px 7px',borderRadius:6,flex:'0 0 auto'},\n      dotStyle:{width:5.5,height:5.5,borderRadius:'50%',background:C.teal,animation:'bbBlink 1.1s infinite',flex:'0 0 auto'},\n      flagStyle:{width:23,height:15,borderRadius:2.5,objectFit:'cover',flex:'0 0 auto',boxShadow:'0 0 0 1px rgba(0,0,0,.1)'},\n      phStyle:{width:23,height:15,borderRadius:2.5,flex:'0 0 auto',background:C.s3,display:'flex',alignItems:'center',justifyContent:'center',fontSize:10,color:C.faint,fontWeight:800},\n      pickBadge:{fontSize:8,fontWeight:800,letterSpacing:'.05em',color:C.goldT,background:'rgba(255,203,69,.3)',padding:'2px 5px',borderRadius:5,flex:'0 0 auto'},\n      a:mk('a'),b:mk('b')}; }\n\n  flowLines(g){ const C=this.C,LC=C.lineS,out=[];\n    const H=(x1,x2,y)=>out.push({style:{position:'absolute',left:Math.min(x1,x2),top:y-1,width:Math.abs(x2-x1),height:2,background:LC}});\n    const V=(x,y1,y2)=>out.push({style:{position:'absolute',left:x-1,top:Math.min(y1,y2),width:2,height:Math.abs(y2-y1),background:LC}});\n    const pair=(p1,p2,ch)=>{ const rE=g.xOf(g.col[p1])+g.NW,cL=g.xOf(g.col[ch]),mx=(rE+cL)/2; H(rE,mx,g.cy[p1]); H(rE,mx,g.cy[p2]); V(mx,g.cy[p1],g.cy[p2]); H(mx,cL,g.cy[ch]); };\n    pair('M1','M2','Q1'); pair('M3','M4','Q2'); pair('M5','M6','Q3'); pair('M7','M8','Q4');\n    pair('Q1','Q2','S1'); pair('Q3','Q4','S2'); pair('S1','S2','F1');\n    return out; }\n\n  buildRounds(){ const C=this.C,order=['R32','R16','QF','SF','F'],cur=this.state.round,idx=order.indexOf(cur);\n    const names={R32:'R32',R16:'R16',QF:'QF',SF:'SF',F:'Final'};\n    const meta={R16:{name:'Round of 16',sub:'4 decided · 3 live · 1 to come',pts:'100 pts each'},QF:{name:'Quarter-finals',sub:'Awaiting R16 winners',pts:'200 pts each'},SF:{name:'Semi-finals',sub:'The last four',pts:'300 pts each'},F:{name:'The Final',sub:'Jul 19 · MetLife',pts:'500 pts'}}[cur]||{name:'',sub:'',pts:''};\n    const g=this.flowGeo(); const colFocus={R16:0,QF:1,SF:2,F:3}[cur];\n    const tx=-(colFocus!=null?colFocus*g.colW:0);\n    const seg=(active,done)=>({flex:1,minWidth:0,height:34,borderRadius:8,border:'none',cursor:'pointer',fontFamily:\"'Roboto',sans-serif\",fontSize:12.5,fontWeight:800,background:active?C.grn:'transparent',color:active?'#fff':(done?C.goldT:C.mut),transition:'background .14s'});\n    const arrow=(en)=>({width:38,height:34,flex:'0 0 auto',display:'flex',alignItems:'center',justifyContent:'center',borderRadius:9,border:'1px solid '+(en?C.lineS:C.line),background:en?C.surface:C.s2,color:en?C.ink:C.faint,cursor:en?'pointer':'default',opacity:en?1:.5});\n    const go=(k)=>()=>this.setState({round:k});\n    return {\n      isR32:cur==='R32', isTree:cur!=='R32',\n      roundName:meta.name, roundMeta:meta.sub, roundPts:meta.pts,\n      r32:Object.keys(this.teams).map(ab=>({ab,flag:this.flag(ab)})),\n      rounds:order.map((k,i)=>({name:names[k],onTap:go(k),segStyle:seg(i===idx,i<idx)})),\n      onPrev:()=>{ if(idx>0)this.setState({round:order[idx-1]}); }, onNext:()=>{ if(idx<order.length-1)this.setState({round:order[idx+1]}); },\n      prevStyle:arrow(idx>0), nextStyle:arrow(idx<order.length-1),\n      flowCanvasStyle:{position:'relative',width:g.canvasW,height:g.canvasH,transform:'translateX('+tx+'px)',transition:'transform .34s cubic-bezier(.2,.8,.2,1)'},\n      flowNodes:['M1','M2','M3','M4','M5','M6','M7','M8','Q1','Q2','Q3','Q4','S1','S2','F1'].map(id=>this.flowNode(id,g)),\n      flowLines:this.flowLines(g),\n      flowHint: cur==='F'?'Swipe ⟵ to step back through the rounds':'Swipe ⟶ for the next round · tap a team to advance',\n      onTS:(e)=>{ try{ this._tx=(e.touches&&e.touches[0])?e.touches[0].clientX:e.clientX; this._ty=(e.touches&&e.touches[0])?e.touches[0].clientY:e.clientY; }catch(_){} },\n      onTE:(e)=>{ try{ const x=(e.changedTouches&&e.changedTouches[0])?e.changedTouches[0].clientX:e.clientX; const y=(e.changedTouches&&e.changedTouches[0])?e.changedTouches[0].clientY:e.clientY; const dx=x-(this._tx||x),dy=y-(this._ty||y); if(Math.abs(dx)>50&&Math.abs(dx)>Math.abs(dy)*1.4){ if(dx<0&&idx<order.length-1)this.setState({round:order[idx+1]}); else if(dx>0&&idx>0)this.setState({round:order[idx-1]}); } }catch(_){} }\n    }; }\n\n  // ---- whole mode (two-sided) ----\n  buildWh
