<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="robots" content="noindex" />
		<title>Page not found — BanglaBracket</title>
		<link rel="icon" type="image/png" href="/favicon.png" />
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link
			href="https://fonts.googleapis.com/css2?family=Baloo+Da+2:wght@600;700;800&family=Hanken+Grotesk:wght@400;500;600;700;800&display=swap"
			rel="stylesheet"
		/>
		<style>
			:root {
				--bg: #f3f6ee;
				--surface: #fff;
				--surface2: #f4f8ee;
				--line: #e0e8d6;
				--lineStrong: #ccd9bf;
				--ink: #15231b;
				--muted: #56664f;
				--gold: #ffcb45;
				--goldText: #9a7400;
				--primary: #0b7a4b;
				--onPrimary: #fff;
				--primaryGlow: rgba(11, 122, 75, 0.28);
				--glowGold: rgba(255, 203, 69, 0.16);
				--glowGreen: rgba(11, 122, 75, 0.1);
				--cardGrad: linear-gradient(180deg, #fff, #f7faf2);
			}
			[data-theme="dark"] {
				--bg: #0a140e;
				--surface: #122017;
				--surface2: #16271b;
				--line: #264231;
				--lineStrong: #37633f;
				--ink: #f3f1e6;
				--muted: #a3b6a6;
				--gold: #ffcb45;
				--goldText: #ffd76a;
				--primary: #ffcb45;
				--onPrimary: #231a05;
				--primaryGlow: rgba(255, 203, 69, 0.22);
				--glowGold: rgba(255, 203, 69, 0.14);
				--glowGreen: rgba(63, 199, 127, 0.1);
				--cardGrad: linear-gradient(180deg, #122017, #0e1b13);
			}
			* {
				box-sizing: border-box;
			}
			html,
			body {
				margin: 0;
				height: 100%;
			}
			body {
				background: var(--bg);
				color: var(--ink);
				font-family: "Hanken Grotesk", system-ui, sans-serif;
				-webkit-font-smoothing: antialiased;
				min-height: 100%;
				display: flex;
				align-items: center;
				justify-content: center;
				padding: 24px;
				position: relative;
				overflow: hidden;
			}
			.glow {
				position: absolute;
				inset: 0;
				pointer-events: none;
				background:
					radial-gradient(70% 50% at 78% -8%, var(--glowGold), transparent 60%),
					radial-gradient(60% 50% at 12% 8%, var(--glowGreen), transparent 60%);
			}
			.card {
				position: relative;
				max-width: 460px;
				width: 100%;
				border: 1px solid var(--line);
				border-radius: 22px;
				background: var(--cardGrad);
				box-shadow: 0 18px 44px -26px rgba(20, 35, 27, 0.24);
				padding: clamp(26px, 6vw, 44px);
				text-align: center;
			}
			.brand {
				display: flex;
				align-items: center;
				justify-content: center;
				gap: 11px;
				margin-bottom: 22px;
			}
			.mark {
				width: 40px;
				height: 40px;
				border-radius: 12px;
				flex: 0 0 auto;
				background: linear-gradient(150deg, #ffd45f, #e8ab1f);
				display: flex;
				align-items: center;
				justify-content: center;
				box-shadow: 0 6px 16px rgba(232, 171, 31, 0.32);
			}
			.word {
				font-family: "Baloo Da 2", sans-serif;
				font-weight: 800;
				font-size: 20px;
			}
			.word .b {
				color: var(--goldText);
			}
			.big {
				font-family: "Baloo Da 2", sans-serif;
				font-weight: 800;
				font-size: clamp(56px, 15vw, 78px);
				line-height: 1;
				color: var(--goldText);
			}
			h1 {
				font-family: "Baloo Da 2", sans-serif;
				font-weight: 800;
				font-size: 23px;
				margin: 10px 0 0;
			}
			p {
				color: var(--muted);
				font-size: 15px;
				line-height: 1.6;
				margin: 12px 0 26px;
				font-weight: 500;
			}
			.actions {
				display: flex;
				flex-direction: column;
				gap: 10px;
			}
			.btn {
				display: inline-flex;
				align-items: center;
				justify-content: center;
				gap: 8px;
				height: 50px;
				border-radius: 14px;
				font-family: inherit;
				font-weight: 800;
				font-size: 15px;
				text-decoration: none;
				cursor: pointer;
			}
			.btn-primary {
				background: var(--primary);
				color: var(--onPrimary);
				border: none;
				box-shadow: 0 10px 26px var(--primaryGlow);
			}
			.btn-ghost {
				background: var(--surface);
				color: var(--ink);
				border: 1px solid var(--lineStrong);
				height: 46px;
				font-weight: 700;
			}
		</style>
	</head>
	<body>
		<div class="glow"></div>
		<div class="card">
			<div class="brand">
				<span class="mark"
					><svg
						width="28"
						height="28"
						viewBox="0 0 48 48"
						fill="none"
						stroke="#1a1405"
						stroke-width="3.2"
						stroke-linecap="round"
						stroke-linejoin="round"
					>
						<path
							d="M4 6H14M4 18H14M4 30H14M4 42H14M14 6V18M14 30V42M14 12H24M14 36H24M24 12V36M24 24H34"
						/>
						<path d="M39 19 44 24 39 29 34 24Z" fill="#1a1405" stroke="none" /></svg
				></span>
				<span class="word">Bangla<span class="b">Bracket</span></span>
			</div>
			<div class="big">404</div>
			<h1>Page not found</h1>
			<p>
				The page you're looking for doesn't exist or has moved. Let's get you back
				on the pitch.
			</p>
			<div class="actions">
				<a class="btn btn-primary" href="/">Go to banglabracket.com</a>
				<a class="btn btn-ghost" href="/wc2026/app/">Open the app</a>
			</div>
		</div>
		<script>
			(function () {
				try {
					if (localStorage.getItem("bb-theme") === "dark")
						document.documentElement.setAttribute("data-theme", "dark");
				} catch (e) {}
			})();
		</script>
	</body>
</html>
